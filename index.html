<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adega Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
:root {
  --cor-fundo: #111;
  --cor-card: #222;
  --cor-destaque: chartreuse;
  --cor-whatsapp: #25D366;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

.container {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 280px;
  background: #1a1a1a;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  border: 2px solid chartreuse;
  background: #222;
  padding: 15px;
  border-radius: 50px;
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  background: #333;
  transform: scale(1.05);
}

.card a {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
}

.main {
  flex: 1;
  padding: 40px;
}

.main h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
}

.main p {
  color: #ccc;
}

.menu {
  margin-top: 40px;
}

.menu h2 {
  margin-bottom: 20px;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

.menu-item {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.menu-item:hover {
  transform: scale(1.05);
  background: #2a2a2a;
}

.menu-item img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.menu-item h3 {
  margin: 10px 0 5px;
  font-size: 1.1em;
}

.price {
  color: #00ff88;
  font-weight: bold;
  font-size: 1.2em;
}

.btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #25D366;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}

@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
  }

  .card {
    min-width: 150px;
  }

  .main {
    padding: 20px;
  }
}
</style>
</head>
<body>
  <!-- Cardápio expandido com dezenas de novos produtos adicionados -->
<!-- CSS atualizado com bordas em chartreuse, cards arredondados e layout responsivo -->
</body>
</html>
